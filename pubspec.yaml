name: jetstream_live
description: A professional, high-performance flight tracking app for Mobile and Desktop.
version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # Map and Location Services
  flutter_map: ^6.0.0
  latlong2: ^0.8.0
  geolocator: ^9.0.2
  
  # Camera and AR
  camera: ^0.10.5
  
  # HTTP and API
  http: ^1.1.0
  url_launcher: ^6.1.0
  
  # State Management
  provider: ^6.0.0
  
  # Local Storage
  shared_preferences: ^2.0.15
  
  # Notifications
  flutter_local_notifications: ^14.0.0
  
  # Utilities
  intl: ^0.19.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700